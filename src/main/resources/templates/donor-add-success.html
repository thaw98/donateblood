<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Donor Added Successfully</title>
</head>
<body>
    <h1>Donor Added Successfully</h1>
    
    <div th:if="${donor}">
        <h2>Donor Information:</h2>
        <p><strong>Name:</strong> <span th:text="${donor.username}"></span></p>
        <p><strong>Email:</strong> <span th:text="${donor.email}"></span></p>
        <p><strong>Gender:</strong> <span th:text="${donor.gender}"></span></p>
        <p><strong>Date of Birth:</strong> <span th:text="${donor.dateofbirth}"></span></p>
        <p><strong>Address:</strong> <span th:text="${donor.address}"></span></p>
    </div>
    
    <div th:if="${hospital}">
        <p><strong>Hospital:</strong> <span th:text="${hospital.hospitalName}"></span></p>
    </div>
    
    <div th:if="${submissionDateTime}">
        <p><strong>Submission Date and Time:</strong> 
           <span th:text="${#temporals.format(submissionDateTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
        </p>
    </div>
    
    <div th:if="${donation}">
        <p><strong>Donation Status:</strong> <span th:text="${donation.status}"></span></p>
        <p><strong>Blood Units:</strong> <span th:text="${donation.bloodUnit}"></span></p>
    </div>
    
    <a th:href="@{/donors/add}">Add Another Donor</a>
</body>
</html>
