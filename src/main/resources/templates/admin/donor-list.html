<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Donors</title>
</head>
<body>
	<h2>All Donors</h2>
	<!-- Filter/Search toolbar -->
	<div style="margin:10px 0; display:flex; gap:8px; align-items:center;">
	  <input id="q" type="search" placeholder="Search name or email…" autocomplete="off" style="padding:6px; width:240px;">
	<select id="btFilter" style="padding:6px;">
	  <option value="">All blood types</option>
	  <option th:each="e : ${bloodTypeMap}"
	          th:value="${e.key}"
	          th:text="${e.value}">
	  </option>
	</select>

  <select id="statusFilter" style="padding:6px;">
    <option value="">All statuses</option>
    <option value="available">Available</option>
    <option value="used">Used</option>
  </select>

  <button type="button" id="clearFilters" style="padding:6px;">Clear</button>
  <span id="matchCount" style="margin-left:8px; color:#555;"></span>
</div>
<table id="donorTable" border="1">
  <tr>
    <th>No.</th>
    <th>Username</th>
    <th>Blood Type</th>
    <th>Date of Birth</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Gender</th>
    <th>Address</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr th:each="d, no : ${donorList}"
      th:data-name="${d.username}"
      th:data-email="${d.email}"
      th:data-btid="${d.bloodTypeId}"
      th:data-bt="${d.bloodTypeId != null ? bloodTypeMap[d.bloodTypeId] : null}"
      th:data-status="${d.status}">
    <td th:text="${no.count}"></td>
    <td th:text="${d.username}"></td>
    <td th:text="${d.bloodTypeId != null ? bloodTypeMap[d.bloodTypeId] : 'Unknown'}"></td>
    <td th:text="${d.dateOfBirth}"></td>
    <td th:text="${d.email}"></td>
    <td th:text="${d.phone}"></td>
    <td th:text="${d.gender}"></td>
    <td th:text="${d.address}"></td>
    <td th:text="${d.status}"></td>
    <td><a th:href="@{/admin/donors/edit/{id}(id=${d.id})}">Edit</a></td>
  </tr>

  <tr id="noRows" style="display:none;">
    <td colspan="10" style="text-align:center; color:#666;">No matching donors</td>
  </tr>
</table>

</body>
<script>
(function () {
  const $  = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));

  const qInput   = $('#q');                 // search box
  const btSelect = $('#btFilter');          // blood type dropdown
  const stSelect = $('#statusFilter');      // status dropdown
  const clearBtn = $('#clearFilters');      // clear button
  const countEl  = $('#matchCount');        // "X matches" label
  const noRows   = $('#noRows');            // "No matching donors" row

  // all data rows (skip header and optional noRows)
  const rows = $$('#donorTable tr').filter(tr =>
    tr.rowIndex !== 0 && tr.id !== 'noRows'
  );

  const normalize = s => (s || '').toString().trim().toLowerCase();

  function matches(row, q, bt, st) {
    const name  = normalize(row.dataset.name);
    const email = normalize(row.dataset.email);
    const text  = name + ' ' + email;

    const okSearch = !q || text.includes(q);

    // blood type by id only
    const rowBtId = (row.dataset.btid || '').toString();
    const okBt = !bt || rowBtId === bt;

    // status: normalize to lowercase
    const rowSt = normalize(row.dataset.status);
    const okSt = !st || rowSt === st;

    return okSearch && okBt && okSt;
  }

  function debounce(fn, ms) {
    let t; return function () { clearTimeout(t); t = setTimeout(() => fn.apply(this, arguments), ms); };
  }

  function applyFilters() {
    const q  = normalize(qInput?.value);
    const bt = btSelect?.value || '';
    const st = normalize(stSelect?.value || '');
    let visible = 0;

    rows.forEach(tr => {
      if (matches(tr, q, bt, st)) {
        tr.style.display = '';
        visible++;
      } else {
        tr.style.display = 'none';
      }
    });

    if (countEl) countEl.textContent = visible ? `${visible} match${visible > 1 ? 'es' : ''}` : '';
    if (noRows) noRows.style.display = visible ? 'none' : '';
  }

  const update = debounce(applyFilters, 120);

  if (qInput)   qInput.addEventListener('input', update);
  if (btSelect) btSelect.addEventListener('change', applyFilters);
  if (stSelect) stSelect.addEventListener('change', applyFilters);
  if (clearBtn) clearBtn.addEventListener('click', () => {
    if (qInput)   qInput.value = '';
    if (btSelect) btSelect.value = '';
    if (stSelect) stSelect.value = '';
    applyFilters();
    if (qInput) qInput.focus();
  });

  // initial run
  applyFilters();
})();
</script>


</html>
