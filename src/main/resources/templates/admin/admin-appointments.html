<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Appointments</title></head>
<body>
<h1>Donor Appointments</h1>

<table border="1" cellpadding="6">
  <tr>
    <th>#</th><th>Donor</th><th>Email</th><th>Phone</th>
    <th>Date</th><th>Time</th><th>Created</th><th>Status</th><th>Action</th>
  </tr>

  <tr th:each="a, i : ${appointments}">
    <td th:text="${i.count}"></td>
    <td th:text="${a.username}"></td>
    <td th:text="${a.email}"></td>
    <td th:text="${a.phone}"></td>
    <td th:text="${a.date}"></td>
    <td th:text="${a.time}"></td>
    <td th:text="${a.created_at}"></td>
    <td th:text="${a.status}"></td>
    <td>
      <form th:action="@{/admin/donors/appointments/{id}/approve(id=${a.id})}"
            method="post" style="display:inline">
        <button type="submit" th:disabled="${a.status != 'pending'}">Approve</button>
      </form>

      <form th:action="@{/admin/donors/appointments/{id}/reject(id=${a.id})}"
            method="post" style="display:inline">
        <button type="submit" th:disabled="${a.status != 'pending'}">Reject</button>
      </form>
    </td>
  </tr>
</table>
</body>
</html>
