<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Donor Appointments</title>
  <!-- Head -->
  <th:block th:replace="fragments/head :: head(${title})"></th:block>
  
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  
  <!-- Custom Donor Admin CSS -->
  <link rel="stylesheet" th:href="@{/css/donor-admin.css}">
  
  <style>
    /* Additional appointment-specific styles */
    .appointment-status {
      padding: 0.25rem 0.65rem;
      border-radius: 15px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .status-pending {
      background-color: rgba(255, 193, 7, 0.15);
      color: #ffc107;
      border: 1px solid #ffc107;
    }
    
    .status-approved {
      background-color: #198754;
      color: white;
      border: none;
    }
    
    .status-rejected {
      background-color: #dc3545;
      color: white;
      border: none;
    }
    
    .btn-approve {
      background: linear-gradient(135deg, #198754 0%, #157347 100%);
      border: none;
      color: white;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .btn-approve:hover:not(:disabled) {
      background: linear-gradient(135deg, #157347 0%, #198754 100%);
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(25, 135, 84, 0.3);
    }
    
    .btn-reject {
      background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
      border: none;
      color: white;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .btn-reject:hover:not(:disabled) {
      background: linear-gradient(135deg, #b02a37 0%, #dc3545 100%);
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(220, 53, 69, 0.3);
    }
    
    .btn-approve:disabled,
    .btn-reject:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .date-badge {
      background: var(--light-color);
      color: var(--dark-color);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .time-badge {
      background: rgba(72, 149, 239, 0.1);
      color: var(--info-color);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div th:replace="fragments/sidebar :: sidebar(${active})"></div>

  <!-- Main Content -->
  <div id="content">
    <!-- Top nav -->
    <div th:replace="~{fragments/topnav :: topnav(${userName}, ${avatarUrl})}"></div>

    <!-- Page content -->
    <main class="container-fluid p-4">
      
      <!-- Page Header -->
      <div class="mb-4 d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <i class="bi bi-calendar-check page-header-icon"></i>
          <div>
            <h2 class="mb-0 fw-bold" style="color: var(--primary-color);">Donor Appointments</h2>
            <p class="text-muted mb-0">
              <i class="bi bi-arrow-right-short"></i>Review and manage donation appointments
            </p>
          </div>
        </div>
        <span class="success-badge">
          <i class="bi bi-clock-history me-1"></i><span th:text="${appointments.size()}"></span> Total
        </span>
      </div>

      <!-- Appointments Table Card -->
      <div class="table-card">
        <div class="table-card-header">
          <i class="bi bi-calendar2-check"></i>
          <span>Appointment Requests</span>
        </div>
        
        <div class="table-responsive">
          <table class="table donor-table">
            <thead>
              <tr>
                <th><i class="bi bi-hash"></i>No.</th>
                <th><i class="bi bi-person"></i>Donor Name</th>
                <th><i class="bi bi-envelope"></i>Email</th>
                <th><i class="bi bi-telephone"></i>Phone</th>
                <th><i class="bi bi-calendar-date"></i>Date</th>
                <th><i class="bi bi-clock"></i>Time</th>
                <th><i class="bi bi-calendar-plus"></i>Created</th>
                <th><i class="bi bi-activity"></i>Status</th>
                <th><i class="bi bi-gear"></i>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="a, i : ${appointments}">
                <td>
                  <span class="row-number" th:text="${i.count}"></span>
                </td>
                <td>
                  <i class="bi bi-person-circle text-muted me-1"></i>
                  <strong th:text="${a.username}"></strong>
                </td>
                <td>
                  <i class="bi bi-envelope-fill text-muted me-1"></i>
                  <span th:text="${a.email}"></span>
                </td>
                <td>
                  <i class="bi bi-phone-vibrate text-muted me-1"></i>
                  <span th:text="${a.phone}"></span>
                </td>
                <td>
                  <span class="date-badge">
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${a.date}"></span>
                  </span>
                </td>
                <td>
                  <span class="time-badge">
                    <i class="bi bi-clock-fill"></i>
                    <span th:text="${a.time}"></span>
                  </span>
                </td>
                <td>
                  <small class="text-muted" th:text="${a.created_at}"></small>
                </td>
                <td>
                  <span th:classappend="${a.status == 'pending' ? 'appointment-status status-pending' : 
                                         (a.status == 'approved' ? 'appointment-status status-approved' : 
                                         'appointment-status status-rejected')}">
                    <i th:classappend="${a.status == 'pending' ? 'bi bi-hourglass-split' : 
                                        (a.status == 'approved' ? 'bi bi-check-circle-fill' : 
                                        'bi bi-x-circle-fill')}"></i>
                    <span th:text="${a.status}"></span>
                  </span>
                </td>
                <td>
                  <div class="d-flex gap-2">
                    <!-- Approve Button -->
                    <form th:action="@{/admin/donors/appointments/{id}/approve(id=${a.id})}"
                          method="post" 
                          style="display:inline">
                      <button type="submit" 
                              class="btn-approve"
                              th:disabled="${a.status != 'pending'}">
                        <i class="bi bi-check-circle-fill"></i>Approve
                      </button>
                    </form>

                    <!-- Reject Button -->
                    <form th:action="@{/admin/donors/appointments/{id}/reject(id=${a.id})}"
                          method="post" 
                          style="display:inline">
                      <button type="submit" 
                              class="btn-reject"
                              th:disabled="${a.status != 'pending'}">
                        <i class="bi bi-x-circle-fill"></i>Reject
                      </button>
                    </form>
                  </div>
                </td>
              </tr>

              <!-- Empty State -->
              <tr th:if="${#lists.isEmpty(appointments)}">
                <td colspan="9" class="no-results">
                  <i class="bi bi-calendar-x"></i>
                  <div>No appointments found</div>
                  <small class="text-muted">Appointment requests will appear here</small>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- JS loaded directly -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script th:src="@{/js/dashboard.js}"></script>

  <script>
    // Optional: Add confirmation dialogs
    document.querySelectorAll('.btn-approve, .btn-reject').forEach(btn => {
      btn.addEventListener('click', function(e) {
        if (!this.disabled) {
          const action = this.classList.contains('btn-approve') ? 'approve' : 'reject';
          if (!confirm(`Are you sure you want to ${action} this appointment?`)) {
            e.preventDefault();
          }
        }
      });
    });
  </script>

</body>
</html>
