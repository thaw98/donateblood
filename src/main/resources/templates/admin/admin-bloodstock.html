<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Blood Stock</title></head>
<body>
  <h1>Blood Stock – Hospital #<span th:text="${hid}">1</span></h1>
  <p><a th:href="@{/admin/donors/appointments}">Back to Appointments</a></p>

  <table border="1" cellpadding="6" cellspacing="0">
    <tr>
      <th>Blood Type</th>
      <th>Units</th>
      <th>Updated Donation</th>
    </tr>
    <tr th:each="r : ${rows}">
      <td th:text="${r.bloodType}">A+</td>
      <td th:text="${r.units}">0</td>
      <td th:text="${r.lastDonation}">—</td>
    </tr>
  </table>
</body>
</html>
