<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Donor</title>
</head>
<body>
    <form th:action="@{/donors/add}" th:object="${donor}" method="post">
        <h1>Add Donor - Admin Dashboard</h1>
        
        <!-- Display current hospital -->
        <div th:if="${hospital}">
            <p><strong>Hospital:</strong> <span th:text="${hospital.hospitalName}"></span></p>
        </div>

        <label for="name">Name</label>
        <input type="text" th:field="*{username}" id="name" required>
        <br>

        <label for="email">Email</label>
        <input type="email" th:field="*{email}" id="email" required>
        <br>

        <label>Gender</label>
        <input type="radio" name="gender" th:value="'Male'" th:field="*{gender}" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" th:value="'Female'" th:field="*{gender}" id="female">
        <label for="female">Female</label>
        <br>

        <label for="dob">Date of Birth</label>
        <input type="date" th:field="*{dateofbirth}" id="dob" required>
        <br>
        
        <!-- Blood Type Dropdown -->
        <label for="bloodType">Blood Type</label>
        <select id="bloodType" name="bloodTypeId">
            <option value="">None</option>
            <option th:each="bloodType : ${bloodTypes}" 
                    th:value="${bloodType.id}" 
                    th:text="${bloodType.bloodType}">
            </option>
        </select>
        <br>
        
        <label for="address">Address</label>
        <textarea id="address" th:field="*{address}" rows="4" cols="50" required></textarea>
        <br>
        
        <div th:if="${error}" style="color: red;">
            <span th:text="${error}"></span>
        </div>
        
        <input type="submit" value="Add">
    </form>
</body>
</html>
